<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据源管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-shadow {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 239, 125, 0.4);
        }
        
        .toast {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .loading {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="gradient-bg text-white py-8 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-center">
                <svg class="w-10 h-10 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                </svg>
                <h1 class="text-3xl font-bold">数据源管理</h1>
            </div>
            <p class="text-center text-purple-100 mt-2">管理多种数据库连接配置</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 -mt-4">
        <div class="max-w-4xl mx-auto">
            <!-- Form Card -->
            <div class="glass-effect rounded-2xl card-shadow p-8 mb-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-6 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    数据源配置
                </h2>

                <form id="datasourceForm" class="space-y-5">
                    <!-- 数据源名称 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">数据源名称</label>
                        <input type="text" id="name" name="name" placeholder="请输入数据源名称"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus outline-none transition-all"
                            required>
                    </div>

                    <!-- 数据源类型 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">数据源类型</label>
                        <select id="dbType" name="dbType"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus outline-none transition-all bg-white"
                            required onchange="updatePortPlaceholder()">
                            <option value="">请选择数据源类型</option>
                            <option value="mysql">MySQL</option>
                            <option value="postgresql">PostgreSQL</option>
                            <option value="oracle">Oracle</option>
                            <option value="redis">Redis</option>
                            <option value="sqlserver">SQL Server</option>
                            <!-- <option value="sqlite">SQLite</option> -->
                        </select>
                    </div>

                    <!-- Host -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">主机地址</label>
                        <input type="text" id="host" name="host" placeholder="localhost 或 IP 地址"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus outline-none transition-all"
                            required>
                    </div>

                    <!-- Port -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">端口</label>
                        <input type="number" id="port" name="port" placeholder="请输入端口号"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus outline-none transition-all"
                            required>
                    </div>

                    <!-- Username -->
                    <div id="usernameGroup">
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus outline-none transition-all">
                    </div>

                    <!-- Password -->
                    <div id="passwordGroup">
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入密码"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus outline-none transition-all">
                    </div>

                    <!-- Buttons -->
                    <div class="flex gap-4 pt-4">
                        <button type="button" onclick="testConnection()"
                            class="flex-1 btn-primary text-white font-semibold py-3 px-6 rounded-lg flex items-center justify-center">
                            <svg id="testIcon" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                            <span id="testText">测试连通性</span>
                        </button>
                        <button type="button" onclick="saveDatasource()"
                            class="flex-1 btn-secondary text-white font-semibold py-3 px-6 rounded-lg flex items-center justify-center">
                            <svg id="saveIcon" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
                            </svg>
                            <span id="saveText">保存数据源</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Data Source List Card -->
            <div class="glass-effect rounded-2xl card-shadow p-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-6 flex items-center justify-between">
                    <span class="flex items-center">
                        <svg class="w-6 h-6 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                        </svg>
                        已保存的数据源
                    </span>
                    <button onclick="refreshList()" class="text-sm btn-primary text-white px-4 py-2 rounded-lg flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        刷新
                    </button>
                </h2>
                
                <div id="datasourceList" class="space-y-3">
                    <div class="text-center text-gray-500 py-8">
                        <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                        </svg>
                        <p>暂无数据源</p>
                    </div>
                </div>
            </div>

            <!-- Detail Modal -->
            <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
                <div class="glass-effect rounded-2xl card-shadow p-8 max-w-md w-full mx-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-800">数据源详情</h3>
                        <button onclick="closeDetailModal()" class="text-gray-500 hover:text-gray-700">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                    <div id="detailContent" class="space-y-3 text-sm">
                        <!-- 详情内容动态填充 -->
                    </div>
                </div>
            </div>

            <!-- Toast Container -->
            <div id="toastContainer" class="fixed top-4 right-4 z-50"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-gray-500 text-sm">
        <p>数据源管理系统 &copy; 2026</p>
    </footer>

    <script>
        // 端口默认值配置
        const defaultPorts = {
            mysql: 3306,
            postgresql: 5432,
            oracle: 1521,
            redis: 6379,
            sqlserver: 1433
        };

        // 根据数据源类型更新端口占位符
        function updatePortPlaceholder() {
            const dbType = document.getElementById('dbType').value;
            const portInput = document.getElementById('port');
            const usernameGroup = document.getElementById('usernameGroup');
            const passwordGroup = document.getElementById('passwordGroup');

            if (dbType && defaultPorts[dbType]) {
                portInput.placeholder = '默认: ' + defaultPorts[dbType];
                // 所有数据源都需要用户名和密码
                usernameGroup.style.display = 'block';
                passwordGroup.style.display = 'block';
                document.getElementById('host').placeholder = 'localhost 或 IP 地址';
            }
        }

        // 显示提示消息
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };

            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg toast mb-2 flex items-center`;
            toast.innerHTML = `
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${type === 'success' 
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>'}
                </svg>
                ${message}
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 设置按钮加载状态
        function setButtonLoading(buttonId, loading) {
            const textEl = document.getElementById(buttonId + 'Text');
            const iconEl = document.getElementById(buttonId + 'Icon');
            const btn = textEl.parentElement;
            
            if (loading) {
                btn.disabled = true;
                textEl.textContent = '处理中...';
                iconEl.innerHTML = '<div class="loading"></div>';
            } else {
                btn.disabled = false;
                const originalTexts = {
                    testText: '测试连通性',
                    saveText: '保存数据源'
                };
                textEl.textContent = originalTexts[buttonId + 'Text'];
                iconEl.innerHTML = buttonId === 'testText'
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>';
            }
        }

        // 测试连通性
        async function testConnection() {
            const form = document.getElementById('datasourceForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = {
                db_type: document.getElementById('dbType').value,
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || defaultPorts[document.getElementById('dbType').value],
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            setButtonLoading('test', true);

            try {
                const response = await fetch('/api/datasource/test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message, 'success');
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('请求失败: ' + error.message, 'error');
            } finally {
                setButtonLoading('test', false);
            }
        }

        // 保存数据源
        async function saveDatasource() {
            const form = document.getElementById('datasourceForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = {
                name: document.getElementById('name').value,
                db_type: document.getElementById('dbType').value,
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || defaultPorts[document.getElementById('dbType').value],
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            setButtonLoading('save', true);

            try {
                const response = await fetch('/api/datasource/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message, 'success');
                    // 清空表单
                    document.getElementById('datasourceForm').reset();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('请求失败: ' + error.message, 'error');
            } finally {
                setButtonLoading('save', false);
            }
        }

        // 刷新数据源列表
        async function refreshList() {
            try {
                const response = await fetch('/api/datasource/list');
                const result = await response.json();
                
                if (result.success) {
                    renderDatasourceList(result.data);
                } else {
                    showToast('获取数据源列表失败: ' + result.message, 'error');
                }
            } catch (error) {
                showToast('请求失败: ' + error.message, 'error');
            }
        }

        // 渲染数据源列表
        function renderDatasourceList(datasources) {
            const container = document.getElementById('datasourceList');
            
            if (datasources.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                        </svg>
                        <p>暂无数据源</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = datasources.map(ds => `
                <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition-colors cursor-pointer" onclick="showDetail(${ds.id})">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold text-gray-800">${ds.name}</h3>
                            <p class="text-sm text-gray-600">${getDBTypeText(ds.db_type)} | ${ds.host}:${ds.port}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-500">${new Date(ds.created_at).toLocaleDateString()}</p>
                            <p class="text-xs text-gray-500">ID: ${ds.id}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 获取数据库类型文本
        function getDBTypeText(dbType) {
            const types = {
                'mysql': 'MySQL',
                'postgresql': 'PostgreSQL',
                'oracle': 'Oracle',
                'redis': 'Redis',
                'sqlserver': 'SQL Server'
            };
            return types[dbType] || dbType;
        }

        // 显示数据源详情
        async function showDetail(id) {
            try {
                const response = await fetch('/api/datasource/' + id);
                const result = await response.json();
                
                if (result.success) {
                    showDetailModal(result.data);
                } else {
                    showToast('获取数据源详情失败: ' + result.message, 'error');
                }
            } catch (error) {
                showToast('请求失败: ' + error.message, 'error');
            }
        }

        // 显示详情弹窗
        function showDetailModal(datasource) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('detailContent');
            
            content.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="font-medium">ID:</span></div><div>${datasource.id}</div>
                    <div><span class="font-medium">名称:</span></div><div>${datasource.name}</div>
                    <div><span class="font-medium">类型:</span></div><div>${getDBTypeText(datasource.db_type)}</div>
                    <div><span class="font-medium">主机:</span></div><div>${datasource.host}</div>
                    <div><span class="font-medium">端口:</span></div><div>${datasource.port}</div>
                    <div><span class="font-medium">用户名:</span></div><div>${datasource.username || '无'}</div>
                    <div><span class="font-medium">密码:</span></div><div>${datasource.password ? '********' : '无'}</div>
                    <div><span class="font-medium">创建时间:</span></div><div>${new Date(datasource.created_at).toLocaleString()}</div>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }

        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // 页面加载时刷新列表
        document.addEventListener('DOMContentLoaded', function() {
            refreshList();
        });
    </script>
</body>
</html>
